<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>quiz game</title>
</head>
<boddy>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Quiz Time!</h1>
            <p>Test your knowledge with these fun questions</p>
            <button id="Start-btn">Start quiz</button>
        </div>
        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">question goes here</h2>
                <div class="quiz-info">
                    <p>
                        question <span id="currente-question">1</span> of <span id="total-question">5</span>
                    </p>
                    <p>score: <span id="score">0</span>
                        
                    </p>
                </div>
            </div>
            <div id="answer-container" class="answer-container">
                <!--Answer buttons-->
            </div>
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>
        <div id="result-screen" class="screen">
            <h1>Quiz results</h1>
            <div class="result-info">
                <p>you scored <span id="final-score"> 0</span>out of <span id="max-score"></span></p>
                <div id="result-message">Good job</div>
            </div>
            <button id="restart-btn">Restart quiz</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
